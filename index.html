<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tokn Based</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── Design tokens ─────────────────────────────────── */
:root {
  --hue: 285;
  --ink:         oklch(0.20 0.02 275);
  --ink-2:       oklch(0.36 0.02 275);
  --ink-3:       oklch(0.54 0.015 275);
  --ink-4:       oklch(0.68 0.012 275);
  --line:        oklch(0.93 0.006 275);
  --line-2:      oklch(0.88 0.008 275);
  --surface:     #ffffff;
  --surface-2:   oklch(0.987 0.004 280);
  --surface-3:   oklch(0.97 0.008 280);
  --accent:      oklch(0.54 0.22 var(--hue));
  --accent-2:    oklch(0.46 0.24 var(--hue));
  --accent-ink:  oklch(0.30 0.18 var(--hue));
  --accent-wash: oklch(0.97 0.035 var(--hue));
  --accent-line: oklch(0.90 0.04 var(--hue));
  --ok:          oklch(0.62 0.15 150);
  --ok-wash:     oklch(0.96 0.04 150);
  --warn:        oklch(0.68 0.17 70);
  --warn-wash:   oklch(0.96 0.05 70);
  --bad:         oklch(0.56 0.20 25);
  --bad-wash:    oklch(0.96 0.04 25);
  --radius-sm:   6px;
  --radius:      10px;
  --radius-lg:   14px;
  --shadow-sm:   0 1px 0 oklch(0.88 0.008 275 / 0.6);
  --shadow:      0 1px 2px rgba(17,20,45,0.04), 0 2px 12px rgba(17,20,45,0.04);
  --shadow-lg:   0 8px 32px rgba(17,20,45,0.08), 0 2px 6px rgba(17,20,45,0.04);
  --font: 'Geist', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}

/* ── Base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  color: var(--ink);
  background: var(--surface-2);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01","cv11";
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ── Aurora ────────────────────────────────────────── */
.aurora {
  position: absolute;
  inset: -40% -10% auto -10%;
  height: 520px;
  pointer-events: none;
  filter: blur(70px) saturate(1.1);
  opacity: 0.75;
  z-index: 0;
}
.aurora::before, .aurora::after {
  content: ""; position: absolute; border-radius: 50%;
}
.aurora::before {
  left: 8%; top: 10%; width: 520px; height: 520px;
  background: radial-gradient(circle at 30% 30%, oklch(0.80 0.18 var(--hue)) 0%, transparent 60%);
}
.aurora::after {
  right: 4%; top: -5%; width: 620px; height: 620px;
  background:
    radial-gradient(circle at 70% 40%, oklch(0.80 0.16 calc(var(--hue) + 40)) 0%, transparent 55%),
    radial-gradient(circle at 40% 80%, oklch(0.82 0.14 calc(var(--hue) - 40)) 0%, transparent 55%);
}

/* ── App shell ─────────────────────────────────────── */
.app { min-height: 100vh; display: flex; flex-direction: column; }
.main { flex: 1; position: relative; overflow: hidden; }

/* ── Top bar ───────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: color-mix(in oklab, var(--surface) 82%, transparent);
  backdrop-filter: saturate(1.3) blur(14px);
  -webkit-backdrop-filter: saturate(1.3) blur(14px);
  border-bottom: 1px solid var(--line);
}
.topbar-inner {
  max-width: 1240px; margin: 0 auto;
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; gap: 20px;
}

/* Logo */
.logo { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: -0.02em; font-size: 15px; flex-shrink: 0; }
.logo-mark {
  width: 26px; height: 26px; border-radius: 7px;
  background: linear-gradient(135deg, var(--accent) 0%, oklch(0.64 0.22 calc(var(--hue) + 30)) 100%);
  position: relative;
  box-shadow: 0 1px 2px rgba(17,20,45,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
  flex-shrink: 0;
}
.logo-mark::after {
  content: ""; position: absolute; inset: 5px; border-radius: 3px;
  background: white; opacity: 0.95;
  -webkit-mask: repeating-linear-gradient(90deg, #000 0 2px, transparent 2px 4px);
          mask: repeating-linear-gradient(90deg, #000 0 2px, transparent 2px 4px);
}
.logo b { font-weight: 600; }
.logo span { color: var(--ink-3); font-weight: 500; margin-left: 2px; }

/* Role switcher */
.role-switcher {
  display: inline-flex; background: var(--surface-2);
  border: 1px solid var(--line); border-radius: 10px; padding: 3px;
  margin-left: auto;
}
.role-switcher button {
  padding: 6px 11px; font-size: 12px; font-weight: 500; color: var(--ink-3);
  border-radius: 7px; display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s; white-space: nowrap;
}
.role-switcher button.active {
  background: var(--surface); color: var(--ink);
  box-shadow: 0 1px 2px rgba(17,20,45,0.06), 0 0 0 1px var(--line);
}
.role-switcher .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-4); flex-shrink: 0; }
.role-switcher button.active .dot { background: var(--accent); }

/* Wallet status */
.wallet-status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-3); flex-shrink: 0; margin-left: 14px; }
.wallet-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); flex-shrink: 0; transition: background 0.3s; }
.wallet-dot.on { background: var(--ok); }
.wallet-addr { font-family: var(--mono); font-size: 11.5px; }

/* ── Container / Layout ────────────────────────────── */
.container { max-width: 1100px; margin: 0 auto; padding: 40px 24px 96px; position: relative; z-index: 1; }
.container-narrow { max-width: 680px; margin: 0 auto; padding: 40px 24px 96px; position: relative; z-index: 1; }

/* ── Hero ──────────────────────────────────────────── */
.hero { position: relative; padding: 48px 0 36px; margin-bottom: 28px; }
.hero h1 { font-size: 40px; letter-spacing: -0.035em; font-weight: 600; line-height: 1.05; }
.hero .eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--accent-ink); font-weight: 500;
  background: var(--accent-wash); border: 1px solid var(--accent-line);
  padding: 4px 10px; border-radius: 999px; margin-bottom: 16px;
}
.hero .eyebrow .pulse {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent); }
  70%  { box-shadow: 0 0 0 8px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.hero p.lead { margin-top: 12px; color: var(--ink-3); font-size: 16px; max-width: 560px; line-height: 1.55; }

/* ── KPI strip (from Tokn_Based.html) ─────────────── */
.kpis {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--radius-lg);
  overflow: hidden; box-shadow: var(--shadow);
  margin-bottom: 36px;
}
.kpi {
  padding: 20px 22px; border-right: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 6px; position: relative;
}
.kpi:last-child { border-right: none; }
.kpi .kpi-label { font-size: 11.5px; color: var(--ink-3); font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; }
.kpi .kpi-value { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; line-height: 1.1; }
.kpi .kpi-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; color: var(--ok); }
.kpi .kpi-delta.neg { color: var(--bad); }
.kpi .kpi-delta.muted { color: var(--ink-3); }
.kpi .spark-pos { position: absolute; right: 14px; top: 14px; width: 80px; height: 28px; opacity: 0.9; }
@media (max-width: 640px) { .kpis { grid-template-columns: repeat(2, 1fr); } .kpi:nth-child(2) { border-right: none; } }

/* ── Section head ──────────────────────────────────── */
.section-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; gap: 16px; }
.section-head h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; }
.section-head .sub { font-size: 13px; color: var(--ink-3); margin-top: 2px; }

/* ── Buttons ───────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-radius: 8px;
  font-size: 13.5px; font-weight: 500; letter-spacing: -0.005em;
  border: 1px solid transparent; transition: all 0.15s; white-space: nowrap;
}
.btn.primary {
  background: var(--accent); color: white;
  box-shadow: 0 1px 0 rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.18),
              0 1px 2px oklch(0.40 0.18 var(--hue) / 0.35);
}
.btn.primary:hover  { background: var(--accent-2); }
.btn.primary:disabled { opacity: 0.5; cursor: default; }
.btn.ghost  { background: var(--surface); color: var(--ink); border-color: var(--line-2); box-shadow: var(--shadow-sm); }
.btn.ghost:hover  { background: var(--surface-2); }
.btn.danger { background: var(--surface); color: var(--bad); border-color: oklch(0.82 0.08 25); }
.btn.danger:hover { background: var(--bad-wash); }
.btn.subtle { color: var(--ink-3); }
.btn.subtle:hover { color: var(--ink); background: var(--surface-2); }
.btn.sm  { padding: 6px 10px; font-size: 12.5px; }
.btn.lg  { padding: 12px 18px; font-size: 14.5px; border-radius: 10px; }
.btn-full { width: 100%; justify-content: center; }

/* ── Card ──────────────────────────────────────────── */
.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow); }
.card + .card { margin-top: 20px; }
.card-header { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.card-header h3 { font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em; }
.card-header .sub { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; }
.card-body { padding: 22px; }

/* ── Chips ─────────────────────────────────────────── */
.chip {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px;
  border-radius: 999px; font-size: 11.5px; font-weight: 500; letter-spacing: -0.005em;
  border: 1px solid var(--line); background: var(--surface-2); color: var(--ink-3);
}
.chip .d { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-4); }
.chip.ok     { background: var(--ok-wash);   color: oklch(0.38 0.12 150); border-color: oklch(0.86 0.08 150); }
.chip.ok .d  { background: var(--ok); }
.chip.bad    { background: var(--bad-wash);  color: oklch(0.38 0.14 25);  border-color: oklch(0.86 0.10 25); }
.chip.bad .d { background: var(--bad); }
.chip.accent { background: var(--accent-wash); color: var(--accent-ink); border-color: var(--accent-line); }
.chip.accent .d { background: var(--accent); }

/* ── Forms ─────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field:last-of-type { margin-bottom: 0; }
.field label { font-size: 12.5px; font-weight: 500; color: var(--ink-2); }
.input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--line-2);
  border-radius: 8px; font-size: 13.5px; background: var(--surface);
  transition: border-color 0.15s, box-shadow 0.15s; font-feature-settings: "ss01";
}
.input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent); }
.input::placeholder { color: var(--ink-4); }
.input-mono { font-family: var(--mono); font-size: 12.5px; }
/* Remove number arrows */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }

/* ── Mobile canvas ─────────────────────────────────── */
.mobile-canvas {
  min-height: calc(100vh - 60px);
  padding: 48px 20px 80px;
  background: radial-gradient(1000px 500px at 50% -10%, var(--accent-wash), transparent 60%), var(--surface-2);
}
.mobile-inner { max-width: 560px; margin: 0 auto; }

/* ── Utilities ─────────────────────────────────────── */
.row   { display: flex; align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.muted { color: var(--ink-3); }
section + section { margin-top: 0; }

/* ── Animations ────────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
@keyframes spin   { to { transform: rotate(360deg); } }

/* ── Spinner ───────────────────────────────────────── */
.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin 0.6s linear infinite;
  opacity: 0.5; flex-shrink: 0;
}

/* ── Result box ────────────────────────────────────── */
.result-box { margin-top: 14px; padding: 13px 16px; border-radius: 10px; font-size: 13px; line-height: 1.6; animation: fadeIn 0.15s ease; }
.result-box.success { background: var(--ok-wash);  border: 1px solid oklch(0.86 0.08 150); }
.result-box.error   { background: var(--bad-wash); border: 1px solid oklch(0.86 0.10 25); }
.result-box.pending { background: var(--surface-2); border: 1px solid var(--line-2); }
.result-box .r-title { font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.result-box.success .r-title { color: oklch(0.38 0.12 150); }
.result-box.error   .r-title { color: oklch(0.38 0.14 25); }
.result-box.pending .r-title { color: var(--ink-3); }
.result-box .r-row  { display: flex; gap: 8px; margin-top: 3px; font-size: 12.5px; }
.result-box .r-key  { color: var(--ink-3); width: 88px; flex-shrink: 0; }
.result-box .r-val  { color: var(--ink); word-break: break-all; }
.result-box .r-mono { font-family: var(--mono); font-size: 11.5px; }

/* ── QR box ────────────────────────────────────────── */
.qr-wrap { margin-top: 16px; padding: 20px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface-2); display: flex; flex-direction: column; align-items: center; gap: 10px; animation: fadeIn 0.2s ease; }
.qr-wrap canvas, .qr-wrap img { display: block; border-radius: 4px; }
.qr-label { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-align: center; word-break: break-all; }

/* ── Verify banner (Türsteher + Verifizieren) ──────── */
.verify-banner { margin-top: 16px; border-radius: 14px; padding: 44px 24px 36px; text-align: center; animation: fadeIn 0.2s ease; }
.verify-banner.valid    { background: var(--ok-wash);   border: 2px solid var(--ok); }
.verify-banner.invalid  { background: var(--bad-wash);  border: 2px solid var(--bad); }
.verify-banner.checking { background: var(--surface-2); border: 2px solid var(--line-2); }
.verify-icon   { font-size: 2.8rem; line-height: 1; margin-bottom: 10px; }
.verify-status { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 18px; }
.verify-status.ok  { color: var(--ok); }
.verify-status.bad { color: var(--bad); }
.verify-status.mid { color: var(--ink-3); }
.verify-meta     { display: flex; flex-direction: column; gap: 6px; font-size: 13.5px; }
.verify-meta-row { display: flex; justify-content: center; gap: 8px; }
.verify-meta-key { color: var(--ink-3); width: 72px; text-align: right; flex-shrink: 0; }
.verify-meta-val { color: var(--ink); font-weight: 500; text-align: left; word-break: break-all; }
.verify-meta-mono { font-family: var(--mono); font-size: 11.5px; font-weight: 400; }

/* ── Doorman big input ─────────────────────────────── */
.doorman-input {
  width: 100%; padding: 18px 20px;
  font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; text-align: center;
  background: var(--surface); border: 1px solid var(--line-2); border-radius: 12px;
  font-family: var(--font); color: var(--ink); outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  -moz-appearance: textfield;
}
.doorman-input::placeholder { color: var(--ink-4); font-weight: 400; }
.doorman-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent); }
.doorman-input::-webkit-outer-spin-button,
.doorman-input::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ── Footer ────────────────────────────────────────── */
.app-footer { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-3); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

/* ═══════════════════════════════════════════════════════
   CONTRACT  —  do not modify
═══════════════════════════════════════════════════════ */
const CONTRACT_ADDRESS = "0x1abe21a7669f8E9E8A95295b132f810807bC143F";
const ABI = [
  {"inputs":[{"internalType":"uint256","name":"tokenId","type":"uint256"}],"name":"invalidateTicket","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"string","name":"eventName","type":"string"}],"name":"mintTicket","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"string","name":"eventName","type":"string"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"batchMintTicket","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[],"stateMutability":"nonpayable","type":"constructor"},
  {"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"tokenId","type":"uint256"}],"name":"TicketInvalidated","type":"event"},
  {"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"tokenId","type":"uint256"},{"indexed":false,"internalType":"address","name":"to","type":"address"},{"indexed":false,"internalType":"string","name":"eventName","type":"string"}],"name":"TicketMinted","type":"event"},
  {"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"tokenId","type":"uint256"},{"indexed":false,"internalType":"address","name":"from","type":"address"},{"indexed":false,"internalType":"address","name":"to","type":"address"}],"name":"TicketTransferred","type":"event"},
  {"inputs":[{"internalType":"uint256","name":"tokenId","type":"uint256"},{"internalType":"address","name":"to","type":"address"}],"name":"transferTicket","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[],"name":"nextTokenId","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"tickets","outputs":[{"internalType":"address","name":"currentOwner","type":"address"},{"internalType":"bool","name":"isValid","type":"bool"},{"internalType":"string","name":"eventName","type":"string"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"tokenId","type":"uint256"}],"name":"verifyTicket","outputs":[{"internalType":"bool","name":"isValid","type":"bool"},{"internalType":"address","name":"currentOwner","type":"address"},{"internalType":"string","name":"eventName","type":"string"}],"stateMutability":"view","type":"function"}
];

const shortAddr = (a) => a.slice(0, 6) + "…" + a.slice(-4);

/* Read-only contract — no wallet needed */
function getReadContract() {
  const provider = window.ethereum
    ? new ethers.providers.Web3Provider(window.ethereum)
    : new ethers.providers.JsonRpcProvider("https://rpc2.sepolia.org");
  return new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
}

/* ═══════════════════════════════════════════════════════
   loadEvents()  —  single source of truth for dashboard data
   Replace this function when the contract changes.
   Returns: [{ name, totalTickets, checkedIn, validTickets }]
═══════════════════════════════════════════════════════ */
async function loadEvents() {
  const rc = getReadContract();

  /* 1. All TicketMinted events */
  const mintedEvents = await rc.queryFilter(rc.filters.TicketMinted());

  /* 2. All TicketInvalidated events → Set of invalidated token IDs */
  const invalidatedEvents = await rc.queryFilter(rc.filters.TicketInvalidated());
  const invalidatedIds = new Set(
    invalidatedEvents.map(e => e.args.tokenId.toString())
  );

  /* 3. Group minted tickets by eventName */
  const eventMap = new Map(); // eventName → Set<tokenId>
  for (const e of mintedEvents) {
    const name    = e.args.eventName;
    const tokenId = e.args.tokenId.toString();
    if (!eventMap.has(name)) eventMap.set(name, new Set());
    eventMap.get(name).add(tokenId);
  }

  /* 4. Build result array */
  const events = [];
  for (const [name, tokenIds] of eventMap) {
    const totalTickets = tokenIds.size;
    const checkedIn    = [...tokenIds].filter(id => invalidatedIds.has(id)).length;
    const validTickets = totalTickets - checkedIn;
    events.push({ name, totalTickets, checkedIn, validTickets });
  }
  return events;
}

/* Sparkline — decorative SVG line chart */
const Spark = ({ data, color = "var(--accent)", width = 80, height = 28 }) => {
  const max = Math.max(...data, 1);
  const step = width / (data.length - 1);
  const pts = data.map((v, i) => `${i * step},${height - (v / max) * (height - 4) - 2}`).join(" ");
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      <polyline fill="none" stroke={color} strokeWidth="1.6"
                strokeLinecap="round" strokeLinejoin="round" points={pts} />
    </svg>
  );
};

/* ResultBox — shows pending / success / error after a tx */
function ResultBox({ result }) {
  if (!result) return null;
  const { type, title, fields } = result;
  return (
    <div className={`result-box ${type}`}>
      <div className="r-title">
        {type === "pending" && <span className="spinner" />}
        {type === "success" && "✓"}
        {type === "error"   && "✕"}
        <span>{title}</span>
      </div>
      {fields && fields.map(([k, v, mono], i) => (
        <div key={i} className="r-row">
          <span className="r-key">{k}</span>
          <span className={`r-val${mono ? " r-mono" : ""}`}>{v}</span>
        </div>
      ))}
    </div>
  );
}

/* QRCodeBox — renders a real scannable QR via QRCode.js */
function QRCodeBox({ tokenId }) {
  const ref = useRef(null);
  useEffect(() => {
    if (tokenId == null || !ref.current) return;
    ref.current.innerHTML = "";
    new QRCode(ref.current, {
      text: `https://sys-emil.github.io/tokn-based/?id=${tokenId}`,
      width: 160, height: 160,
      colorDark: "#111111", colorLight: "#f9fafb",
    });
  }, [tokenId]);
  if (tokenId == null) return null;
  return (
    <div className="qr-wrap">
      <div ref={ref} />
      <span className="qr-label">
        https://sys-emil.github.io/tokn-based/?id={tokenId}
      </span>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   VIEW 1 — MINT  (role="mint")
   Maps to: index.html "Veranstalter" tab
   Blockchain: mintTicket, batchMintTicket, transferTicket
═══════════════════════════════════════════════════════ */
function MintView({ walletConnected, walletAddress, isOwner, onConnect, contractRef }) {

  /* KPI: live nextTokenId */
  const [mintCount, setMintCount] = useState(null);
  useEffect(() => {
    getReadContract().nextTokenId()
      .then(n => setMintCount(n.toNumber()))
      .catch(() => {});
  }, []);

  /* ── Mint form state ── */
  const [mintTo,       setMintTo]       = useState("");
  const [mintEvent,    setMintEvent]    = useState("");
  const [mintResult,   setMintResult]   = useState(null);
  const [mintQrId,     setMintQrId]     = useState(null);

  /* ── Batch mint form state ── */
  const [batchTo,      setBatchTo]      = useState("");
  const [batchEvent,   setBatchEvent]   = useState("");
  const [batchAmount,  setBatchAmount]  = useState("");
  const [batchResult,  setBatchResult]  = useState(null);

  /* ── Transfer form state ── */
  const [xfrId,        setXfrId]        = useState("");
  const [xfrTo,        setXfrTo]        = useState("");
  const [xfrResult,    setXfrResult]    = useState(null);

  const ensureConnected = async () => {
    if (!contractRef.current) await onConnect();
  };

  /* ── mintTicket ── */
  async function mintTicket() {
    try {
      await ensureConnected();
      const c = contractRef.current;
      if (!mintTo.trim() || !mintEvent.trim()) {
        setMintResult({ type: "error", title: "Bitte alle Felder ausfüllen." });
        return;
      }
      setMintQrId(null);
      setMintResult({ type: "pending", title: "Transaktion wird gesendet…" });
      const tx = await c.mintTicket(mintTo.trim(), mintEvent.trim());
      setMintResult({ type: "pending", title: "Warte auf Bestätigung…" });
      const receipt  = await tx.wait();
      const nextId   = await c.nextTokenId();
      const mintedId = nextId.toNumber() - 1;
      setMintCount(nextId.toNumber());
      setMintResult({
        type: "success",
        title: `Ticket #${mintedId} erstellt`,
        fields: [
          ["Event",     mintEvent.trim()],
          ["Empfänger", mintTo.trim(),           true],
          ["TX",        receipt.transactionHash, true],
        ],
      });
      setMintQrId(mintedId);
    } catch (e) {
      setMintResult({ type: "error", title: e.reason || e.message });
      setMintQrId(null);
    }
  }

  /* ── batchMintTicket ── */
  async function batchMintTickets() {
    try {
      await ensureConnected();
      const c      = contractRef.current;
      const amount = parseInt(batchAmount, 10);
      if (!batchTo.trim() || !batchEvent.trim() || !amount) {
        setBatchResult({ type: "error", title: "Bitte alle Felder ausfüllen." });
        return;
      }
      if (amount < 1 || amount > 500) {
        setBatchResult({ type: "error", title: "Anzahl muss zwischen 1 und 500 liegen." });
        return;
      }
      setBatchResult({ type: "pending", title: "Transaktion wird gesendet…" });
      const tx = await c.batchMintTicket(batchTo.trim(), batchEvent.trim(), amount);
      setBatchResult({ type: "pending", title: "Warte auf Bestätigung…" });
      const receipt = await tx.wait();
      const minted  = receipt.events.filter(e => e.event === "TicketMinted");
      const firstId = minted[0].args.tokenId.toNumber();
      const lastId  = minted[minted.length - 1].args.tokenId.toNumber();
      const newNext = await c.nextTokenId();
      setMintCount(newNext.toNumber());
      setBatchResult({
        type: "success",
        title: `${amount} Tickets erstellt`,
        fields: [
          ["Event",     batchEvent.trim()],
          ["Erste ID",  `#${firstId}`],
          ["Letzte ID", `#${lastId}`],
          ["Anzahl",    String(amount)],
          ["Empfänger", batchTo.trim(),           true],
          ["TX",        receipt.transactionHash,  true],
        ],
      });
    } catch (e) {
      setBatchResult({ type: "error", title: e.reason || e.message });
    }
  }

  /* ── transferTicket ── */
  async function transferTicket() {
    try {
      await ensureConnected();
      const c = contractRef.current;
      if (!xfrId || !xfrTo.trim()) {
        setXfrResult({ type: "error", title: "Bitte alle Felder ausfüllen." });
        return;
      }
      setXfrResult({ type: "pending", title: "Transaktion wird gesendet…" });
      const tx = await c.transferTicket(xfrId, xfrTo.trim());
      setXfrResult({ type: "pending", title: "Warte auf Bestätigung…" });
      const receipt = await tx.wait();
      setXfrResult({
        type: "success",
        title: `Ticket #${xfrId} übertragen`,
        fields: [
          ["Neuer Besitzer", xfrTo.trim(),           true],
          ["TX",             receipt.transactionHash, true],
        ],
      });
    } catch (e) {
      setXfrResult({ type: "error", title: e.reason || e.message });
    }
  }

  const minted = mintCount != null ? mintCount - 1 : null;

  return (
    <>
      {/* ── Aurora backdrop ── */}
      <div className="aurora" />

      <div className="container">

        {/* ── Hero ── */}
        <div className="hero">
          <div className="eyebrow">
            <span className="pulse" />
            Ethereum Sepolia · <span style={{ fontFamily: "var(--mono)", fontSize: 11 }}>0x1abe…43F</span>
          </div>
          <h1>NFT Ticket Verwaltung</h1>
          <p className="lead">
            Tickets minten, übertragen und verwalten — fälschungssicher auf der Ethereum Sepolia Blockchain.
          </p>

          {!walletConnected ? (
            <div className="row gap-2" style={{ marginTop: 22 }}>
              <button className="btn primary lg" onClick={onConnect}>
                <Icon name="wifi" size={15} /> Wallet verbinden
              </button>
            </div>
          ) : (
            <div className="row gap-3" style={{ marginTop: 20 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--ok)", display: "inline-block", flexShrink: 0 }} />
              <span style={{ fontFamily: "var(--mono)", fontSize: 13, color: "var(--ink-3)" }}>{walletAddress}</span>
              {isOwner && <span className="chip ok"><span className="d" />Contract Owner</span>}
            </div>
          )}
        </div>

        {/* ── KPI strip ── */}
        <div className="kpis">
          <div className="kpi">
            <div className="kpi-label">Gemintete Tickets</div>
            <div className="kpi-value">{minted != null ? minted : "–"}</div>
            <div className="kpi-delta muted">seit Deployment</div>
            <div className="spark-pos">
              <Spark data={[1, 1, 2, 3, 3, 5, 7, 8, minted || 10, (minted || 10) + 1]} />
            </div>
          </div>
          <div className="kpi">
            <div className="kpi-label">Nächste Token ID</div>
            <div className="kpi-value">{mintCount != null ? mintCount : "–"}</div>
            <div className="kpi-delta muted">auto-increment</div>
          </div>
          <div className="kpi">
            <div className="kpi-label">Netzwerk</div>
            <div className="kpi-value" style={{ fontSize: 22, letterSpacing: "-0.01em" }}>Sepolia</div>

          <div className="card-body">
            <div className="field">
              <label>Empfänger-Adresse</label>
              <input className="input input-mono" placeholder="0x…" value={batchTo} onChange={e => setBatchTo(e.target.value)} />
            </div>
            <div className="field">
              <label>Event Name</label>
              <input className="input" placeholder="z. B. Konzert München · 12. Juli" value={batchEvent} onChange={e => setBatchEvent(e.target.value)} />
            </div>
            <div className="field">
              <label>Anzahl Tickets (1–500)</label>
              <input className="input" type="number" min="1" max="500" placeholder="10" value={batchAmount} onChange={e => setBatchAmount(e.target.value)} />
            </div>
            <button className="btn primary btn-full" style={{ marginTop: 4 }} onClick={batchMintTickets}>
              <Icon name="plus" size={14} /> Tickets erstellen
            </button>
            <ResultBox result={batchResult} />
          </div>
        </div>

        {/* ── Section: Transfer ── */}
        <div className="section-head" style={{ marginTop: 36 }}>
          <div>
            <h2>Ticket übertragen</h2>
            <div className="sub">Token an eine andere Wallet-Adresse senden</div>
          </div>
        </div>

        {/* Card: Transfer */}
        <div className="card">
          <div className="card-header">
            <div>
              <h3>Transfer</h3>
              <div className="sub">Benötigt Wallet-Verbindung als aktueller Besitzer</div>
            </div>
            <Icon name="arrow" size={16} strokeWidth={1.5} />
          </div>
          <div className="card-body">
            <div className="field">
              <label>Token ID</label>
              <input className="input" type="number" min="1" placeholder="1" value={xfrId} onChange={e => setXfrId(e.target.value)} />
            </div>
            <div className="field">
              <label>Neue Besitzer-Adresse</label>
              <input className="input input-mono" placeholder="0x…" value={xfrTo} onChange={e => setXfrTo(e.target.value)} />
            </div>
            <button className="btn primary btn-full" style={{ marginTop: 4 }} onClick={transferTicket}>
              <Icon name="arrow" size={14} /> Ticket übertragen
            </button>
            <ResultBox result={xfrResult} />
          </div>
        </div>

        <footer className="app-footer">
          <span>Tokn Based · 2025</span>
          <span>Sepolia Testnet</span>
        </footer>

      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════════════
   VIEW 2 — MEINE TICKETS  (role="attendee")
   Maps to: index.html "Meine Tickets" tab
   Blockchain: queryFilter(TicketMinted), queryFilter(TicketTransferred), verifyTicket
═══════════════════════════════════════════════════════ */
function AttendeeView({ walletConnected, walletAddress, onConnect }) {
  const [searchInput,  setSearchInput]  = useState("");
  const [tickets,      setTickets]      = useState([]);
  const [loading,      setLoading]      = useState(false);
  const [emptyMsg,     setEmptyMsg]     = useState("");
  const [resultAddr,   setResultAddr]   = useState("");
  const hasAutoLoaded = useRef(false);

  async function loadTicketsForAddress(rawAddress) {
    const userAddr = rawAddress.toLowerCase();
    setLoading(true);
    setTickets([]);
    setEmptyMsg("");
    setResultAddr("");
    try {
      const rc = getReadContract();

      /* Schritt 1: Alle Mint- und Transfer-Events laden */
      const mintedEvents   = await rc.queryFilter(rc.filters.TicketMinted());
      const transferEvents = await rc.queryFilter(rc.filters.TicketTransferred());

      /* Schritt 2: Ownership ableiten */
      const owned = new Set();
      for (const e of mintedEvents) {
        if (e.args.to.toLowerCase() === userAddr) owned.add(e.args.tokenId.toString());
      }
      for (const e of transferEvents) {
        const id = e.args.tokenId.toString();
        if (e.args.to.toLowerCase()   === userAddr) owned.add(id);
        if (e.args.from.toLowerCase() === userAddr) owned.delete(id);
      }

      setResultAddr(shortAddr(rawAddress));
      const tokenIds = Array.from(owned);

      if (tokenIds.length === 0) {
        setEmptyMsg("Keine Tickets gefunden für diese Adresse.");
        setLoading(false);
        return;
      }

      /* Schritt 3: Status parallel abrufen */
      const results = await Promise.all(
        tokenIds.map(id => rc.verifyTicket(id).then(r => ({ id, isValid: r[0], eventName: r[2] })))
      );
      setTickets(results);
    } catch (e) {
      setEmptyMsg("Fehler: " + (e.reason || e.message));
    } finally {
      setLoading(false);
    }
  }

  /* Auto-load once wallet connects */
  useEffect(() => {
    if (walletConnected && walletAddress && !hasAutoLoaded.current) {
      hasAutoLoaded.current = true;
      loadTicketsForAddress(walletAddress);
    }
  }, [walletConnected, walletAddress]);

  async function searchByAddress() {
    const input = searchInput.trim();
    if (!input.startsWith("0x") || input.length !== 42) {
      setEmptyMsg("Bitte eine gültige Ethereum-Adresse eingeben (0x…, 42 Zeichen).");
      setTickets([]);
      setResultAddr("");
      return;
    }
    await loadTicketsForAddress(input);
  }

  async function connectAndLoad() {
    await onConnect();
    /* loadTicketsForAddress fires via useEffect after walletAddress updates */
  }

  return (
    <div className="mobile-canvas">
      <div className="mobile-inner">

        {/* Hero */}
        <div style={{ marginBottom: 32 }}>
          <h1 style={{ fontSize: 30, fontWeight: 600, letterSpacing: "-0.03em" }}>Meine Tickets</h1>
          <p style={{ marginTop: 8, color: "var(--ink-3)", fontSize: 15, lineHeight: 1.55 }}>
            Alle Tickets, die aktuell deiner Wallet gehören.
          </p>
        </div>

        {/* Wallet connect prompt */}
        {!walletConnected && (
          <div className="card" style={{ padding: 24, textAlign: "center", marginBottom: 20 }}>
            <div style={{ width: 40, height: 40, borderRadius: 10, background: "var(--accent-wash)", border: "1px solid var(--accent-line)", display: "grid", placeItems: "center", margin: "0 auto 12px", color: "var(--accent)" }}>
              <Icon name="users" size={18} />
            </div>
            <p style={{ color: "var(--ink-3)", fontSize: 14, marginBottom: 16 }}>
              Verbinde deine Wallet um deine Tickets automatisch zu laden.
            </p>
            <button className="btn primary" onClick={connectAndLoad}>
              <Icon name="wifi" size={14} /> Wallet verbinden
            </button>
          </div>
        )}

        {/* Address search card */}
        <div className="card">
          <div className="card-header">
            <div>
              <h3>Adresse nachschlagen</h3>
              <div className="sub">Kein Wallet nötig</div>
            </div>
            <Icon name="search" size={16} strokeWidth={1.5} />
          </div>
          <div className="card-body">
            <div className="field">
              <label>Wallet-Adresse</label>
              <input
                className="input input-mono"
                placeholder="0x…"
                value={searchInput}
                onChange={e => setSearchInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && searchByAddress()}
              />
            </div>
            <button className="btn primary btn-full" onClick={searchByAddress}>
              <Icon name="search" size={14} /> Tickets suchen
            </button>
          </div>
        </div>

        {/* Loading */}
        {loading && (
          <div className="row gap-2" style={{ padding: "24px 0", color: "var(--ink-3)", fontSize: 14 }}>
            <span className="spinner" /> Tickets werden geladen…
          </div>
        )}

        {/* Result label */}
        {resultAddr && !loading && (
          <div style={{ fontSize: 12, color: "var(--ink-3)", marginTop: 20, marginBottom: 8 }}>
            Tickets für <span style={{ fontFamily: "var(--mono)" }}>{resultAddr}</span>
          </div>
        )}

        {/* Empty state */}
        {emptyMsg && !loading && (
          <div style={{ padding: "32px 0", textAlign: "center", color: "var(--ink-3)", fontSize: 14 }}>
            {emptyMsg}
          </div>
        )}

        {/* Ticket cards */}
        {tickets.length > 0 && !loading && (
          <div className="card" style={{ marginTop: resultAddr ? 0 : 20 }}>
            {tickets.map((t, i) => (
              <div key={t.id} style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                padding: "16px 20px",
                borderTop: i === 0 ? "none" : "1px solid var(--line)",
              }}>
                <div>
                  <div style={{ fontSize: 11, fontFamily: "var(--mono)", color: "var(--ink-3)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 3 }}>
                    Token #{t.id}
                  </div>
                  <div style={{ fontWeight: 500, fontSize: 14 }}>{t.eventName || "–"}</div>
                </div>
                <span className={`chip ${t.isValid ? "ok" : "bad"}`}>
                  <span className="d" />{t.isValid ? "Gültig" : "Entwertet"}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   VIEW 3 — VERIFIZIEREN  (role="verify")
   Maps to: read-only ticket lookup (kein Wallet nötig)
   Blockchain: verifyTicket (view only)
═══════════════════════════════════════════════════════ */
function VerifyView() {
  const [tokenId, setTokenId] = useState("");
  const [banner,  setBanner]  = useState(null);

  async function verifyTicket() {
    const id = String(tokenId).trim();
    if (!id) {
      setBanner({ state: "checking", icon: "·", text: "Token ID eingeben", cls: "mid", meta: [] });
      return;
    }
    setBanner({ state: "checking", icon: "⟳", text: "Abfrage läuft…", cls: "mid", meta: [] });
    try {
      const rc = getReadContract();
      const [isValid, currentOwner, eventName] = await rc.verifyTicket(id);
      const nullAddr = "0x0000000000000000000000000000000000000000";
      if (currentOwner === nullAddr) {
        setBanner({ state: "invalid", icon: "✕", text: "Ticket existiert nicht", cls: "bad", meta: [["Token ID", `#${id}`]] });
        return;
      }
      if (isValid) {
        setBanner({
          state: "valid", icon: "✓", text: "GÜLTIG", cls: "ok",
          meta: [["Token ID", `#${id}`], ["Event", eventName], ["Besitzer", shortAddr(currentOwner), true]],
        });
      } else {
        setBanner({
          state: "invalid", icon: "✕", text: "ENTWERTET", cls: "bad",
          meta: [["Token ID", `#${id}`], ["Event", eventName], ["Besitzer", shortAddr(currentOwner), true]],
        });
      }
    } catch (e) {
      setBanner({ state: "invalid", icon: "!", text: e.reason || e.message, cls: "bad", meta: [] });
    }
  }

  return (
    <div className="mobile-canvas">
      <div className="mobile-inner">

        <div style={{ marginBottom: 32, textAlign: "center" }}>
          <h1 style={{ fontSize: 30, fontWeight: 600, letterSpacing: "-0.03em" }}>Ticket verifizieren</h1>
          <p style={{ marginTop: 8, color: "var(--ink-3)", fontSize: 15 }}>
            Token ID eingeben — kein Wallet nötig.
          </p>
        </div>

        <div className="card">
          <div className="card-header">
            <div>
              <h3>Ticket prüfen</h3>
              <div className="sub">Liest direkt von der Blockchain</div>
            </div>
            <Icon name="activity" size={16} strokeWidth={1.5} />
          </div>
          <div className="card-body">
            <div className="field">
              <label>Token ID</label>
              <input
                className="input"
                type="number"
                min="1"
                placeholder="z. B. 42"
                value={tokenId}
                onChange={e => setTokenId(e.target.value)}
                onKeyDown={e => e.key === "Enter" && verifyTicket()}
                style={{ fontSize: 18, fontWeight: 600, textAlign: "center", letterSpacing: "-0.01em" }}
              />
            </div>
            <button className="btn primary btn-full" onClick={verifyTicket}>
              <Icon name="scan" size={14} /> Ticket prüfen
            </button>
          </div>
        </div>

        <VerifyBanner banner={banner} />
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   VIEW 4 — TÜRSTEHER  (role="door")
   Maps to: index.html "Einlass" tab
   Blockchain: verifyTicket + invalidateTicket
═══════════════════════════════════════════════════════ */
function DoorView({ onConnect, contractRef }) {
  const [doorId,             setDoorId]             = useState("");
  const [banner,             setBanner]             = useState(null);
  const [invalidateVisible,  setInvalidateVisible]  = useState(false);
  const [invalidateResult,   setInvalidateResult]   = useState(null);

  async function doormanVerify(idOverride) {
    const id = String(idOverride !== undefined ? idOverride : doorId).trim();
    if (!id) {
      setBanner({ state: "checking", icon: "·", text: "Token ID eingeben", cls: "mid", meta: [] });
      return;
    }
    setBanner({ state: "checking", icon: "⟳", text: "Abfrage läuft…", cls: "mid", meta: [] });
    setInvalidateVisible(false);
    setInvalidateResult(null);
    try {
      const rc = getReadContract();
      const [isValid, currentOwner, eventName] = await rc.verifyTicket(id);
      const nullAddr = "0x0000000000000000000000000000000000000000";
      if (currentOwner === nullAddr) {
        setBanner({ state: "invalid", icon: "✕", text: "Ticket existiert nicht", cls: "bad", meta: [["Token ID", `#${id}`]] });
        return;
      }
      if (isValid) {
        setBanner({
          state: "valid", icon: "✓", text: "GÜLTIG", cls: "ok",
          meta: [["Token ID", `#${id}`], ["Event", eventName], ["Besitzer", shortAddr(currentOwner), true]],
        });
      } else {
        setBanner({
          state: "invalid", icon: "✕", text: "ENTWERTET", cls: "bad",
          meta: [["Token ID", `#${id}`], ["Event", eventName], ["Besitzer", shortAddr(currentOwner), true]],
        });
      }
      setInvalidateVisible(true);
    } catch (e) {
      setBanner({ state: "invalid", icon: "!", text: e.reason || e.message, cls: "bad", meta: [] });
    }
  }

  async function doormanInvalidate() {
    const id = String(doorId).trim();
    if (!id) return;
    try {
      if (!contractRef.current) await onConnect();
      const c = contractRef.current;
      setInvalidateResult({ type: "pending", title: "Transaktion wird gesendet…" });
      const tx = await c.invalidateTicket(id);
      setInvalidateResult({ type: "pending", title: "Warte auf Bestätigung…" });
      const receipt = await tx.wait();
      setInvalidateResult({
        type: "success",
        title: `Ticket #${id} entwertet`,
        fields: [["TX", receipt.transactionHash, true]],
      });
      setBanner({
        state: "invalid", icon: "✕", text: "ENTWERTET", cls: "bad",
        meta: [["Token ID", `#${id}`], ["Status", "Soeben entwertet"]],
      });
      setInvalidateVisible(false);
    } catch (e) {
      setInvalidateResult({ type: "error", title: e.reason || e.message });
    }
  }

  /* URL param ?id= — QR-Scan endpoint */
  useEffect(() => {
    const id = new URLSearchParams(window.location.search).get("id");
    if (id) {
      setDoorId(id);
      doormanVerify(id);
    }
  }, []);

  return (
    <div className="mobile-canvas">
      <div className="mobile-inner">

        <div style={{ marginBottom: 32, textAlign: "center" }}>
          <h1 style={{ fontSize: 30, fontWeight: 600, letterSpacing: "-0.03em" }}>Einlasskontrolle</h1>
          <p style={{ marginTop: 8, color: "var(--ink-3)", fontSize: 15 }}>
            Token ID eingeben und prüfen. Wallet nur für Entwerten nötig.
          </p>
        </div>

        {/* Big token ID input */}
        <div className="card" style={{ padding: 20 }}>
          <input
            type="number"
            className="doorman-input"
            placeholder="Token ID"
            value={doorId}
            onChange={e => setDoorId(e.target.value)}
            onKeyDown={e => e.key === "Enter" && doormanVerify()}
          />
          <button
            className="btn primary btn-full"
            style={{ marginTop: 12, padding: "13px 14px", fontSize: 15 }}
            onClick={() => doormanVerify()}
          >
            <Icon name="scan" size={16} /> Ticket prüfen
          </button>
        </div>

        {/* Big result banner */}
        <VerifyBanner banner={banner} />

        {/* Invalidate button — only visible after a successful verify */}
        {invalidateVisible && (
          <button
            className="btn danger btn-full"
            style={{ marginTop: 12, padding: "12px 14px", fontSize: 14 }}
            onClick={doormanInvalidate}
          >
            <Icon name="x" size={14} /> Ticket entwerten
          </button>
        )}

        <ResultBox result={invalidateResult} />
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   TOP BAR — Logo-mark + 4-tab Role Switcher + Wallet status
═══════════════════════════════════════════════════════ */
function TopBar({ role, setRole, walletConnected, walletAddress }) {
  return (
    <div className="topbar">
      <div className="topbar-inner">

        {/* Logo */}
        <div className="logo">
          <span className="logo-mark" />
          <b>Tokn</b><span>Based</span>
        </div>

        {/* Primary role switcher — Dashboard + 3 user-facing views */}
        <div className="role-switcher" role="tablist" aria-label="Ansicht wählen">
          <button
            className={role === "organizer" ? "active" : ""}
            onClick={() => setRole("organizer")}
            aria-selected={role === "organizer"}
          >
            <span className="dot" /><Icon name="layers" size={12} strokeWidth={2} /> Dashboard
          </button>
          <button
            className={role === "attendee" ? "active" : ""}
            onClick={() => setRole("attendee")}
            aria-selected={role === "attendee"}
          >
            <span className="dot" /><Icon name="users" size={12} strokeWidth={2} /> Meine Tickets
          </button>
          <button
            className={role === "verify" ? "active" : ""}
            onClick={() => setRole("verify")}
            aria-selected={role === "verify"}
          >
            <span className="dot" /><Icon name="scan" size={12} strokeWidth={2} /> Verifizieren
          </button>
          <button
            className={role === "door" ? "active" : ""}
            onClick={() => setRole("door")}
            aria-selected={role === "door"}
          >
            <span className="dot" /><Icon name="shield" size={12} strokeWidth={2} /> Türsteher
          </button>
        </div>

        {/* Secondary: Mint action — ghost normally, primary when active */}
        <button
          className={`btn sm${role === "mint" ? " primary" : " ghost"}`}
          style={{ flexShrink: 0 }}
          onClick={() => setRole("mint")}
        >
          <Icon name="plus" size={13} strokeWidth={2.2} /> Mint
        </button>

        {/* Wallet status */}
        <div className="wallet-status">
          <span className={`wallet-dot${walletConnected ? " on" : ""}`} />
          {walletConnected
            ? <span className="wallet-addr">{shortAddr(walletAddress)}</span>
            : <span>Nicht verbunden</span>
          }
        </div>

      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════ */
function App() {
  const [role,            setRole]            = useState("organizer");
  const [walletConnected, setWalletConnected] = useState(false);
  const [walletAddress,   setWalletAddress]   = useState("");
  const [isOwner,         setIsOwner]         = useState(false);
  const contractRef = useRef(null);

  /* URL param ?id= → jump straight to Türsteher */
  useEffect(() => {
    const id = new URLSearchParams(window.location.search).get("id");
    if (id) setRole("door");
  }, []);

  async function connectWallet() {
    if (!window.ethereum) { alert("MetaMask nicht gefunden."); return; }
    const provider      = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer        = provider.getSigner();
    const c             = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    contractRef.current = c;
    const address       = await signer.getAddress();
    const contractOwner = await c.owner();
    setWalletAddress(address);
    setWalletConnected(true);
    setIsOwner(address.toLowerCase() === contractOwner.toLowerCase());
  }

  return (
    <div className="app">
      <TopBar
        role={role}
        setRole={setRole}
        walletConnected={walletConnected}
        walletAddress={walletAddress}
      />
      <div className="main">
        {role === "organizer" && (
          <OrganizerDashboard
            walletConnected={walletConnected}
            walletAddress={walletAddress}
            isOwner={isOwner}
            onConnect={connectWallet}
            onMint={() => setRole("mint")}
          />
        )}
        {role === "mint"     && (
          <MintView
            walletConnected={walletConnected}
            walletAddress={walletAddress}
            isOwner={isOwner}
            onConnect={connectWallet}
            contractRef={contractRef}
          />
        )}
        {role === "attendee" && (
          <AttendeeView
            walletConnected={walletConnected}
            walletAddress={walletAddress}
            onConnect={connectWallet}
          />
        )}
        {role === "verify"   && <VerifyView />}
        {role === "door"     && (
          <DoorView
            onConnect={connectWallet}
            contractRef={contractRef}
          />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
